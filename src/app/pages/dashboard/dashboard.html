    <p>Select a service to continue</p>
  </div>

  <div class="card-container">

    <mat-card class="service-card">
      <div class="icon">⚡</div>
      <h3>Electrician</h3>
      <p>Fix wiring, switches, and appliances</p>
      <button mat-stroked-button color="primary" routerLink="/bookservice">Book</button>

    <mat-card class="service-card">
      <div class="icon">🚿</div>
      <h3>Plumber</h3>
      <p>Fix leaks, pipes, and fittings</p>

    </mat-card>

    <mat-card class="service-card">
      <div class="icon">🧹</div>
      <h3>Cleaning</h3>
