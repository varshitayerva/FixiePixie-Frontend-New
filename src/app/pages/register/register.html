<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <h1>FixiePixie</h1>
    <p>Your smart home service partner</p>
  </div>

  <!-- RIGHT SIDE -->
    <div class="right">
        <mat-card style="background-color:#faf9fd;box-shadow: none;" class="register-card">
        <h2>Sign Up</h2>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Name</mat-label>
            <input matInput>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email</mat-label>
            <input matInput type="email">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input matInput type="password">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Confirm Password</mat-label>
            <input matInput type="password">
        </mat-form-field>

        <button mat-raised-button color="primary" class="full-width">
            Register
        </button>

        <p class="link">
            Already have an account?
            <a routerLink="/">Login</a>
        </p>
        </mat-card>
    </div>

</div>
